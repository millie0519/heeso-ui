<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script src="../includes/common-head.js"></script>
  <style>
    .tpl-timetable-01 {width: 100%; border-collapse: collapse; table-layout: fixed; border-bottom: 1px solid rgba(0,0,0,.2);}
    .tpl-timetable-01 thead th {background: var(--prime); color: #fff; font-weight: 500; font-size: 18px; text-align: center; padding: 10px 4px; border-left: 1px solid rgba(0,0,0,.2);}
    .tpl-timetable-01 thead th:first-child {border-left: none;}
    .tpl-timetable-01 .day-sat {color: #3862ff !important;}
    .tpl-timetable-01 .day-sun {color: #ff3838 !important;}
    .tpl-timetable-01 td {vertical-align: top; border-left: 1px solid rgba(0,0,0,.2); padding: 0; height: 90px;}
    .tpl-timetable-01 td:first-child {border-left: none;}
    .tpl-timetable-01 .date-label {display: block; font-size: 15px; height: 22px; line-height: 22px; font-weight: 500; color: #333; background: var(--sub); text-align: center;}
    .tpl-timetable-01 .slots {display: grid; grid-template-rows: repeat(5, auto); grid-auto-flow: column; gap: 1px 0; padding: 10px 5px 15px;}
    .tpl-timetable-01 .slot {display: block; font-size: 13px; font-weight: 500; letter-spacing: -0.07em; color: #444; line-height: 1.7; white-space: nowrap;}
    .tpl-timetable-01 .slot::before {content: '·'; margin-right: 2px;}
    .tpl-timetable-01 .empty-cell {min-height: 90px;}
  </style>
</head>
<body>
  <div class="copy-top w-1080">
    <div style="display:flex; align-items:center; gap:8px;">
      <label style="font-size:13px;">Prime Color</label>
      <input type="color" id="colorPicker" value="#25c373">
      <input type="text" id="colorHex" value="#25c373" maxlength="7" style="width:80px; height:28px; padding:0 8px; border:1px solid #ddd; border-radius:4px; font-size:13px; font-family:monospace;">
      <button id="btnApply" style="height:28px; padding:0 12px; background:#333; color:#fff; border:none; border-radius:4px; font-size:13px; cursor:pointer;">적용</button>
      <span class="fz-12 txc-g50">*6자리 HEX 코드로 입력</span>
    </div>
  </div>
  <div class="copy-wrap w-1080">
    <table class="tpl-timetable-01">
      <thead>
        <tr>
          <th>월요일</th>
          <th>화요일</th>
          <th>수요일</th>
          <th>목요일</th>
          <th>금요일</th>
          <th class="day-sat">토요일</th>
          <th class="day-sun">일요일</th>
        </tr>
      </thead>
      <tbody id="tpl-timetable-01-body"></tbody>
    </table>
    <script>
      // -------------------------------------------------------
      // 1) 데이터 정의
      // -------------------------------------------------------
      const FULL_SLOTS   = ["10:00-10:40","11:00-11:40","12:00-12:40","14:00-14:40","15:00-15:40","17:00-17:40","18:00-18:40","19:00-19:40"];
      const MORN_SLOTS   = ["10:00-10:40","11:00-11:40","14:00-14:40","15:00-15:40","17:00-17:40"];
      const MORN_SLOTS2  = ["10:00-10:40","11:00-11:40","12:00-12:40","14:00-14:40","15:00-15:40"];

      // 표시할 날짜 범위
      const START_DATE    = new Date("2024-12-23"); // 첫 주 월요일 (테이블 시작)
      const END_DATE      = new Date("2025-01-20"); // 마지막 날짜
      const CONTENT_START = new Date("2024-12-27"); // 날짜 표시 시작일

      const schedule = {
        "2024-12-27": FULL_SLOTS,
        "2024-12-28": MORN_SLOTS,
        "2024-12-29": FULL_SLOTS,
        "2024-12-30": FULL_SLOTS,
        "2024-12-31": FULL_SLOTS,
        "2025-01-04": MORN_SLOTS,
        "2025-01-05": FULL_SLOTS,
        "2025-01-06": FULL_SLOTS,
        "2025-01-07": FULL_SLOTS,
        "2025-01-08": FULL_SLOTS,
        "2025-01-11": MORN_SLOTS2,
        "2025-01-12": FULL_SLOTS,
        "2025-01-13": FULL_SLOTS,
        "2025-01-14": FULL_SLOTS,
        "2025-01-19": FULL_SLOTS,
        "2025-01-20": FULL_SLOTS,
      };      

      // -------------------------------------------------------
      // 2) 헬퍼 함수
      // -------------------------------------------------------
      function toKey(d) {
        return d.toISOString().slice(0, 10); // "YYYY-MM-DD"
      }

      function toLabel(d) {
        return `${d.getMonth() + 1}/${d.getDate()}`; // "12/27"
      }

      function getDayClass(d) {
        const day = d.getDay();
        if (day === 6) return "day-sat";
        if (day === 0) return "day-sun";
        return "";
      }

      // 월요일부터 시작하는 주 배열 생성
      function buildWeeks(start, end) {
        const weeks = [];
        let cur = new Date(start);

        // start가 월요일이 아니면 해당 주 월요일로 맞춤
        const dow = cur.getDay();
        const diff = (dow === 0) ? -6 : 1 - dow;
        cur.setDate(cur.getDate() + diff);

        while (cur <= end) {
          const week = [];
          for (let i = 0; i < 7; i++) {
            week.push(new Date(cur));
            cur.setDate(cur.getDate() + 1);
          }
          weeks.push(week);
        }
        return weeks;
      }

      // -------------------------------------------------------
      // 3) 렌더링
      // -------------------------------------------------------
      function renderCell(date) {
        const key   = toKey(date);
        const label = toLabel(date);
        const cls   = getDayClass(date);
        const slots = schedule[key];

        const isInRange = !(date < CONTENT_START || date > END_DATE);

        const $inner = $('<div class="cell-inner">');
        const $dateLabel = $('<span class="date-label">').text(isInRange ? label : '');
        if (cls) $dateLabel.addClass(cls);
        $inner.append($dateLabel);

        if (!isInRange) {
          return $('<td>').append($inner);
        }

        if (slots && slots.length) {
          const $slots = $('<div class="slots">');

          slots.forEach(s => $slots.append($('<span class="slot">').text(s)));
          $inner.append($slots);
        }

        return $('<td>').append($inner);
      }

      function render() {
        const $tbody = $('#tpl-timetable-01-body');
        const weeks  = buildWeeks(START_DATE, END_DATE);

        weeks.forEach(week => {
          const $tr = $('<tr>');
          week.forEach(date => $tr.append(renderCell(date)));
          $tbody.append($tr);
        });
      }

      $(render);

      // -------------------------------------------------------
      // 4) 컬러 피커
      // -------------------------------------------------------
      function hexToRgb(hex) {
        return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
      }

      function mix(rgb, t) {
        return '#' + rgb.map(function(v) {
          return Math.round(255 + (v - 255) * t).toString(16).padStart(2,'0');
        }).join('');
      }

      function applyColor(hex) {
        if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
        var rgb = hexToRgb(hex);
        var table = document.querySelector('.tpl-timetable-01');
        table.style.setProperty('--prime', hex);
        table.style.setProperty('--sub', mix(rgb, 0.30));
      }

      var picker   = document.getElementById('colorPicker');
      var hexInput = document.getElementById('colorHex');

      applyColor('#25c373');

      picker.addEventListener('input', function () {
        hexInput.value = picker.value;
        applyColor(picker.value);
      });

      document.getElementById('btnApply').addEventListener('click', function () {
        var val = hexInput.value;
        if (/^#[0-9a-fA-F]{6}$/.test(val)) {
          picker.value = val;
          applyColor(val);
        }
      });
    </script>
  </div>
</body>
</html>
