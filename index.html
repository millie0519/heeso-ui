<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공통 UI 템플릿 카탈로그</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styleguide.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <h1 class="logo"><img src="https://www.ssamplus.com/images/main2020/logo.png" alt="KG에듀원 희소쌤플러스"></h1>
  </header>

  <!-- 메인 컨텐츠 -->
  <div class="container">

    <!-- ===== 좌측 : 목록 패널 ===== -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <select id="categorySelect" class="category-select">
          <option value="all">전체</option>
          <option value="form">폼</option>
          <option value="table">테이블</option>
          <option value="popup">팝업</option>
        </select>
        <input type="text" id="searchInput" class="search-input" placeholder="템플릿 검색...">
        <p class="result-count">총 <span id="totalCount"></span>개</p>
      </div>

      <ul class="template-list" id="templateList"></ul>
    </aside>

    <!-- ===== 우측 : 미리보기 패널 ===== -->
    <main class="preview-panel">
      <div class="preview-header">
        <div class="preview-title-wrap">
          <h2 class="preview-title" id="previewTitle">기본 입력 폼</h2>
          <p class="preview-desc" id="previewDesc"></p>
        </div>
        <div class="preview-actions">
          <button class="btn btn-code" id="btnCode">코드 보기</button>
          <button class="btn btn-open" id="btnOpen">새 탭에서 열기</button>
        </div>
      </div>
      <div class="preview-body">
        <iframe id="previewFrame" class="preview-iframe" src="templates/forms/form-basic.html"></iframe>
        <!-- 미리보기 파일이 없을 때 표시 -->
        <div class="preview-empty" id="previewEmpty">
          <span class="empty-icon">&#128065;</span>
          <p>왼쪽 목록에서 템플릿을 선택하세요</p>
        </div>
      </div>
    </main>

  </div>

  <!-- 코드 뷰어 모달 -->
  <div class="code-modal" id="codeModal">
    <div class="code-modal-inner">
      <div class="code-modal-header">
        <span class="code-modal-title" id="codeModalTitle"></span>
        <div class="code-modal-actions">
          <button class="btn-copy" id="btnCopy">코드 복사</button>
          <button class="code-modal-close" id="codeModalClose">
            <svg width='20' height='20' viewbox='0 0 20 20' stroke-width='1.5' stroke='#aaa' class="d-block">
              <line x1='2' y1='2' x2='18' y2='18' />
              <line x1='2' y1='18' x2='18' y2='2' />
            </svg>
          </button>
        </div>
      </div>
      <pre class="code-modal-body"><code id="codeModalContent"></code></pre>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
